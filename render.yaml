services:
  # Backend API Service
  - type: web
    name: audioconvert-pro-api
    runtime: node
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://audioconvert-pro-frontend.onrender.com
      - key: UPLOAD_DIR
        value: uploads
      - key: CONVERTED_DIR
        value: converted
      - key: FILE_RETENTION_MINUTES
        value: 60
      - key: CLEANUP_INTERVAL_MINUTES
        value: 15
      - key: MAX_UPLOAD_SIZE_MB
        value: 100
      - key: MAX_UPLOAD_FILES
        value: 10
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: UPLOAD_RATE_LIMIT_MAX
        value: 10

  # Frontend Static Site
  - type: web
    name: audioconvert-pro-frontend
    runtime: static
    plan: free
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://audioconvert-pro-api.onrender.com/api
